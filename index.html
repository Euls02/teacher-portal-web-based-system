<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Teachers Portal | Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<style>
:root {
  --primary-green: #2e7d32;
  --dark-green: #1b5e20;
  --light-green: #4caf50;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Work Sans', sans-serif;
  background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 50%, #388e3c 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

.login-card {
  background: white;
  border-radius: 24px;
  padding: 3rem 2.5rem;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  max-width: 450px;
  width: 90%;
  animation: fadeInUp 0.6s ease-out;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.login-header {
  text-align: center;
  margin-bottom: 2rem;
}

/* SMALL LOGO - 60px */
.login-logo {
  width: 60px;
  height: 60px;
  object-fit: contain;
  margin-bottom: 1rem;
  display: block;
  margin-left: auto;
  margin-right: auto;
}

.login-header h1 {
  font-family: 'Crimson Pro', serif;
  font-size: 2rem;
  font-weight: 700;
  color: var(--primary-green);
  margin-bottom: 0.5rem;
}

.login-header .subtitle {
  font-size: 0.9rem;
  color: #666;
  font-weight: 500;
}

.auth-section h2 {
  font-family: 'Crimson Pro', serif;
  font-size: 1.6rem;
  color: var(--primary-green);
  margin-bottom: 1.5rem;
  text-align: center;
}

.form-group {
  margin-bottom: 1.2rem;
}

.form-group label {
  display: block;
  font-weight: 600;
  color: var(--primary-green);
  margin-bottom: 0.4rem;
  font-size: 0.9rem;
}

.form-group input {
  width: 100%;
  padding: 0.8rem 1rem;
  border: 2px solid #a5d6a7;
  border-radius: 10px;
  font-size: 1rem;
  transition: all 0.3s ease;
  font-family: 'Work Sans', sans-serif;
}

.form-group input:focus {
  outline: none;
  border-color: var(--primary-green);
  box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.1);
}

.btn {
  width: 100%;
  padding: 0.9rem;
  border: none;
  border-radius: 10px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  font-family: 'Work Sans', sans-serif;
  background: linear-gradient(135deg, var(--primary-green), var(--light-green));
  color: white;
  box-shadow: 0 4px 15px rgba(46, 125, 50, 0.3);
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(46, 125, 50, 0.4);
}

.btn:disabled {
  opacity: 0.7;
  cursor: not-allowed;
}

.error-message {
  color: #d32f2f;
  font-size: 0.85rem;
  margin-top: 0.8rem;
  text-align: center;
  font-weight: 500;
  display: none;
  background: #ffebee;
  padding: 0.6rem;
  border-radius: 8px;
}

.error-message:not(:empty) {
  display: block;
}

.auth-switch {
  text-align: center;
  margin-top: 1.2rem;
  font-size: 0.9rem;
  color: #666;
}

.auth-switch a {
  color: var(--primary-green);
  text-decoration: none;
  font-weight: 600;
}

.auth-switch a:hover {
  text-decoration: underline;
}

.login-footer {
  text-align: center;
  margin-top: 1.5rem;
  color: rgba(255, 255, 255, 0.8);
  font-size: 0.85rem;
}
</style>
</head>
<body>
<div style="width: 100%; max-width: 500px; padding: 2rem;">
  <div class="login-card">
    <div class="login-header">
      <img src="2c41ee4a-1282-462a-ba5d-019375e704b4.jpg" alt="College Logo" class="login-logo" />
      <h1>Teachers Portal</h1>
      <p class="subtitle">Empowering Educators, Inspiring Excellence</p>
    </div>

    <!-- Login Section -->
    <section id="login-section" class="auth-section">
      <h2><i class="fas fa-sign-in-alt"></i> Welcome Back</h2>
      <form id="login-form" onsubmit="return false;">
        <div class="form-group">
          <label for="username"><i class="fas fa-user"></i> Username</label>
          <input type="text" id="username" autocomplete="off" placeholder="Enter your username" />
        </div>
        <div class="form-group">
          <label for="password"><i class="fas fa-lock"></i> Password</label>
          <input type="password" id="password" autocomplete="off" placeholder="Enter your password" />
        </div>
        <button type="button" id="login-btn" class="btn">
          <i class="fas fa-arrow-right"></i> Sign In
        </button>
        <p id="login-error" class="error-message"></p>
      </form>
      <p class="auth-switch">Don't have an account? <a href="#" id="show-register">Register here</a></p>
    </section>

    <!-- Register Section -->
    <section id="register-section" class="auth-section" style="display:none;">
      <h2><i class="fas fa-user-plus"></i> Create Account</h2>
      <form id="register-form" onsubmit="return false;">
        <div class="form-group">
          <label for="register-username"><i class="fas fa-user"></i> Username</label>
          <input type="text" id="register-username" autocomplete="off" placeholder="Choose a username" />
        </div>
        <div class="form-group">
          <label for="register-password"><i class="fas fa-lock"></i> Password</label>
          <input type="password" id="register-password" autocomplete="off" placeholder="Create a password" />
        </div>
        <div class="form-group">
          <label for="confirm-password"><i class="fas fa-lock"></i> Confirm Password</label>
          <input type="password" id="confirm-password" autocomplete="off" placeholder="Confirm your password" />
        </div>
        <button type="button" id="register-btn" class="btn">
          <i class="fas fa-user-check"></i> Create Account
        </button>
        <p id="register-error" class="error-message"></p>
      </form>
      <p class="auth-switch">Already have an account? <a href="#" id="show-login">Login here</a></p>
    </section>
  </div>

  <div class="login-footer">
    <p>&copy; 2026 Teachers Portal. All rights reserved.</p>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const loginSection = document.getElementById('login-section');
  const registerSection = document.getElementById('register-section');
  const showRegisterLink = document.getElementById('show-register');
  const showLoginLink = document.getElementById('show-login');
  const loginBtn = document.getElementById('login-btn');
  const registerBtn = document.getElementById('register-btn');
  const loginError = document.getElementById('login-error');
  const registerError = document.getElementById('register-error');

  // Show register form
  showRegisterLink.addEventListener('click', (e) => {
    e.preventDefault();
    loginSection.style.display = 'none';
    registerSection.style.display = 'block';
    loginError.textContent = '';
    registerError.textContent = '';
  });

  // Show login form
  showLoginLink.addEventListener('click', (e) => {
    e.preventDefault();
    registerSection.style.display = 'none';
    loginSection.style.display = 'block';
    loginError.textContent = '';
    registerError.textContent = '';
  });

  // Login handler
  loginBtn.addEventListener('click', () => {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    loginError.textContent = '';

    if (!username || !password) {
      loginError.textContent = 'Please fill in all fields.';
      return;
    }

    loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing In...';
    loginBtn.disabled = true;

    setTimeout(() => {
      const users = JSON.parse(localStorage.getItem('users')) || [];
      const user = users.find(u => u.username === username);

      if (!user) {
        loginError.textContent = 'Username not registered. Please register first.';
        loginBtn.innerHTML = '<i class="fas fa-arrow-right"></i> Sign In';
        loginBtn.disabled = false;
        return;
      }

      if (user.password !== password) {
        loginError.textContent = 'Incorrect password. Please try again.';
        loginBtn.innerHTML = '<i class="fas fa-arrow-right"></i> Sign In';
        loginBtn.disabled = false;
        return;
      }

      localStorage.setItem('currentUser', username);
      loginBtn.innerHTML = '<i class="fas fa-check"></i> Success!';
      
      setTimeout(() => {
        window.location.href = 'home.html';
      }, 500);
    }, 600);
  });

  // Register handler
  registerBtn.addEventListener('click', () => {
    const username = document.getElementById('register-username').value.trim();
    const password = document.getElementById('register-password').value;
    const confirmPassword = document.getElementById('confirm-password').value;

    registerError.textContent = '';

    if (!username || !password || !confirmPassword) {
      registerError.textContent = 'Please fill in all fields.';
      return;
    }

    if (username.length < 3) {
      registerError.textContent = 'Username must be at least 3 characters long.';
      return;
    }

    if (password.length < 6) {
      registerError.textContent = 'Password must be at least 6 characters long.';
      return;
    }

    if (password !== confirmPassword) {
      registerError.textContent = 'Passwords do not match.';
      return;
    }

    registerBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';
    registerBtn.disabled = true;

    setTimeout(() => {
      const users = JSON.parse(localStorage.getItem('users')) || [];
      const userExists = users.some(u => u.username === username);

      if (userExists) {
        registerError.textContent = 'Username already exists. Please choose another.';
        registerBtn.innerHTML = '<i class="fas fa-user-check"></i> Create Account';
        registerBtn.disabled = false;
        return;
      }

      users.push({ username, password });
      localStorage.setItem('users', JSON.stringify(users));
      
      registerBtn.innerHTML = '<i class="fas fa-check"></i> Account Created!';
      
      setTimeout(() => {
        alert('Registration successful! You can now log in.');
        registerSection.style.display = 'none';
        loginSection.style.display = 'block';
        registerError.textContent = '';

        document.getElementById('register-username').value = '';
        document.getElementById('register-password').value = '';
        document.getElementById('confirm-password').value = '';
        
        registerBtn.innerHTML = '<i class="fas fa-user-check"></i> Create Account';
        registerBtn.disabled = false;
      }, 800);
    }, 600);
  });

  // Enter key support
  document.getElementById('password').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') loginBtn.click();
  });

  document.getElementById('confirm-password').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') registerBtn.click();
  });
});
</script>
</body>
</html>
